name: CI

on:
  push:
    branches: [main, "feature/**", "claude/**", "dev/**"]
  pull_request:
    branches: [main, "feature/**", "claude/**", "dev/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: read

    env:
      GITHUB_TOKEN: \${{ secrets.GITHUB_TOKEN }}
      GITHUB_ACTOR: \${{ github.actor }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up JDK $java_version$
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '$java_version$'
          distribution: 'temurin'

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Check formatting (Scalafmt)
        run: sbt scalafmtCheckAll

      - name: Compile (includes WartRemover + tpolecat checks)
        run: sbt compile

      - name: Check Scalafix rules
        run: sbt "scalafixAll --check"

      - name: Run tests with coverage
        run: sbt coverage test coverageReport

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: \${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  doc-generator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up JDK $java_version$
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '$java_version$'
          distribution: 'temurin'

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Compile doc generator
        run: sbt docGenerator/compile

      - name: Run doc generator tests
        run: sbt docGenerator/test
