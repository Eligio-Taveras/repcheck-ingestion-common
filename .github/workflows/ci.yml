name: CI

on:
  push:
    branches: [main, "feature/**", "feat/**", "fix/**", "chore/**", "claude/**", "dev/**"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: read

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_ACTOR: ${{ github.actor }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Check formatting (Scalafmt)
        run: sbt scalafmtCheckAll

      - name: Compile (includes WartRemover + tpolecat checks)
        run: sbt compile

      - name: Check Scalafix rules
        run: sbt "scalafixAll --check"

      - name: Pull AlloyDB Omni image (cached for DB-backed integration tests)
        run: docker pull google/alloydbomni:16.8.0

      - name: Run non-Docker tests with coverage
        run: sbt coverage test coverageReport

      - name: Upload non-Docker coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: unit

      - name: Run DB-backed integration tests against AlloyDB Omni with coverage
        # `dockerTest` is a build.sbt command alias that flips the testOptions filter to
        # INCLUDE only @DockerRequired specs. The default `sbt test` task above EXCLUDES them.
        # `coverage` / `coverageReport` are sbt commands wrapped around the alias so the
        # integration suites contribute to overall coverage.
        # `clean` ensures scoverage measurement data from the non-Docker run is cleared so
        # the integration-flag report on Codecov reflects only the DB-backed suites.
        run: sbt clean coverage dockerTest coverageReport

      - name: Upload Docker coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: integration

  doc-generator:
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_ACTOR: ${{ github.actor }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Compile doc generator
        run: sbt docGenerator/compile

      - name: Run doc generator tests
        run: sbt docGenerator/test
